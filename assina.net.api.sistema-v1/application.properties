spring.datasource.username=assinanet
spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.password=${DB_PASSWORD:}

#JPA
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

#Oracle
#spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle10gDialect
#spring.datasource.url=jdbc:sqlserver://localhost;databaseName=assina-net
#spring.datasource.username=C##assinanet



spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.datasource.hikari.connection-timeout=300000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
#Spring
spring.main.banner-mode=off
spring.profiles.active=prod
#spring.profiles.active=dev
#JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=3600
# Servidor
server.port=8080
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
# Locale JSON
spring.jackson.time-zone=Brazil/East
spring.jackson.locale=pt-BR

logging.level.org.hibernate.SQL=debug
#to show sql
spring.jpa.properties.hibernate.show_sql=false
#formatting
spring.jpa.properties.hibernate.format_sql=true
#printing parameter values in order
logging.level.org.hibernate.type.descriptor.sql=trace

spring.jpa.properties.hibernate.default_batch_fetch_size=100


JobGerarContratosAssinadosPendentes=false
JobCancelarContratosPendentes=false
JobEnviarEmailAssinaturaPendente=false
JobEnviarEmailsPendentesComErro=false
JobEnviarEmailsProblemaChaveAcesso=false
JobMigrarDocumentoParaStorage=true
